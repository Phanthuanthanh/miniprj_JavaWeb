<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Todo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; margin-top: 5px; }
        .btn-save { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<h2 th:text="${todo.id == null ? 'Thêm công việc mới' : 'Cập nhật công việc'}"></h2>

<form th:action="@{/save}" th:object="${todo}" method="post">
    <input type="hidden" th:field="*{id}">

    <div class="form-group">
        <label>Nội dung công việc:</label>
        <input type="text" th:field="*{content}">
        <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
    </div>

    <div class="form-group">
        <label>Ngày hết hạn:</label>
        <input type="date" th:field="*{dueDate}">
        <p class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></p>
    </div>

    <div class="form-group">
        <label>Trạng thái:</label>
        <input type="text" th:field="*{status}">
    </div>

    <div class="form-group">
        <label>Mức độ ưu tiên:</label>
        <input type="text" th:field="*{priority}">
    </div>

    <div style="margin-top: 20px;">
        <button type="submit" class="btn-save">Lưu lại</button>
        <a th:href="@{/}" style="margin-left:10px; text-decoration:none; color:#666;">Quay lại</a>
    </div>
</form>

</body>
</html>
