<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f8f9fa; }
        .header-info { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f1f3f5; color: #495057; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }

        /* Style cho các nút bấm */
        .btn { text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 14px; display: inline-block; cursor: pointer; border: none; transition: 0.3s; }
        .btn-add { background-color: #28a745; color: white; margin-bottom: 15px; padding: 10px 20px; }
        .btn-edit { background-color: #ffc107; color: #212529; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; color: white; }
        .btn:hover { opacity: 0.8; }

        .lang-switch a { text-decoration: none; font-weight: bold; color: #007bff; margin-left: 10px; }
    </style>
</head>
<body>

<div class="header-info">
    <h2 th:text="#{todo.title} + ' ' + ${session.ownerName}"></h2>
    <div class="lang-switch">
        <a href="?lang=vi">Tiếng Việt</a> |
        <a href="?lang=en">English</a>
    </div>
</div>

<br>
<a th:href="@{/add}" class="btn btn-add" th:text="#{todo.add}"></a>

<table>
    <thead>
    <tr>
        <th th:text="#{todo.id}"></th>
        <th th:text="#{todo.content}"></th>
        <th th:text="#{todo.date}"></th>
        <th th:text="#{todo.status}"></th>
        <th th:text="#{todo.priority}"></th>
        <th th:text="#{todo.action}"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${todos}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.content}"></td>
        <td th:text="${t.dueDate}"></td>
        <td th:text="${t.status}"></td>
        <td th:text="${t.priority}"></td>
        <td>
            <a th:href="@{/edit/{id}(id=${t.id})}" class="btn btn-edit" th:text="#{todo.edit}"></a>
            <a th:href="@{/delete/{id}(id=${t.id})}" class="btn btn-delete"
               th:text="#{todo.delete}"
               onclick="return confirm('Bạn có chắc chắn muốn xóa không?')"></a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
